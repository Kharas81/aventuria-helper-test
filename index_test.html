<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventuria Pro-Tool (TEST)</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/features.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AVENTURIA PRO-DASHBOARD</h1>
            <div class="ambience-box">
                <button onclick="playMusic('forest')" title="Wald">🌲</button>
                <button onclick="playMusic('dungeon')" title="Kerker">🏰</button>
                <button onclick="stopMusic()">🔇</button>
                <audio id="bgAudio" loop></audio>
            </div>
        </header>

        <section class="search-section">
            <input type="text" id="cardSearch" placeholder="Suche nach Karte, Monster oder Set..." onkeyup="searchCards()">
            <div id="searchResults" class="search-results hidden"></div>
        </section>

        <div class="top-bar">
            <div class="config-item">
                <label>Helden:</label>
                <input type="number" id="heroCount" value="2" min="1" max="4">
            </div>
            <div class="config-item">
                <label>Schwierigkeit:</label>
                <select id="difficulty">
                    <option value="einfach">Einfach</option>
                    <option value="normal" selected>Normal</option>
                    <option value="schwer">Schwer</option>
                </select>
            </div>
        </div>

        <section id="selection">
            <select id="adventurePicker">
                <option value="">-- Abenteuer wählen --</option>
                <optgroup label="Grundbox">
                    <option value="base_game/silvanas_befreiung">Silvanas Befreiung</option>
                    <option value="base_game/leute_nicht_spielen">Leute, die nicht spielen</option>
                    <option value="base_game/wildenstein_akt_1">Das Erbe von Wildenstein - Akt I</option>
                </optgroup>
            </select>
        </section>

        <div id="setup-display" class="hidden">
            <h2 id="title"></h2>

            <div id="boss-ai" class="boss-ai-box hidden">
                <h3>⚠️ Boss-Spezialregeln</h3>
                <p id="boss-text"></p>
            </div>

            <div class="grid-container">
                <div class="card-list" id="blue-cards"><h3>Abenteuer (Blau)</h3><ul></ul></div>
                <div class="card-list" id="minions"><h3>Schergen</h3><p id="danger-value"></p><ul></ul></div>
                <div class="card-list" id="special"><h3>Spezial (Grün)</h3><ul></ul></div>
            </div>

            <div class="reward-section">
                <button class="btn-outline" onclick="toggleSection('reward-list')">🏆 Belohnungen anzeigen</button>
                <div id="reward-list" class="hidden-section">
                    <div id="reward-display" class="reward-grid"></div>
                </div>
            </div>

            <div class="deck-validator">
                <h3>🎴 Deckbau-Check</h3>
                <input type="number" id="deckCount" placeholder="Kartenanzahl" onchange="validateDeck()">
                <span id="deckFeedback"></span>
            </div>
        </div>

        <footer class="logbook">
            <h3>📖 Helden-Logbuch</h3>
            <div class="log-controls">
                <button class="btn" onclick="saveLog()">Speichern</button>
                <button class="btn-outline" onclick="loadLog()">Laden</button>
            </div>
            <p id="logStatus">Kein Spielstand gefunden.</p>
        </footer>
    </div>

    <script src="js/app_test.js"></script>
</body>
</html>
