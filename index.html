<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventuria Setup-Helper</title>
    <link rel="stylesheet" href="css/aventura-theme.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AVENTURIA Setup-Guide</h1>
            <div class="player-config">
                <label for="heroCount">Anzahl Helden:</label>
                <input type="number" id="heroCount" value="2" min="1" max="6">
            </div>
        </header>

        <main>
            <section id="selection">
                <select id="adventurePicker">
                    <option value="">-- Abenteuer wählen --</option>
                    <optgroup label="Grundbox">
                        <option value="base_game/silvanas_befreiung">Silvanas Befreiung</option>
                        <option value="base_game/wildenstein_akt_1">Das Erbe von Wildenstein - Akt I</option>
                    </optgroup>
                </select>
            </section>

            <section id="setup-display" class="hidden">
                <h2 id="title"></h2>
                <div class="grid-container">
                    <div class="card-list" id="blue-cards">
                        <h3>Abenteuerkarten (Blau)</h3>
                        <ul></ul>
                    </div>
                    <div class="card-list" id="minions">
                        <h3>Schergendeck (Monster)</h3>
                        <p id="danger-value"></p>
                        <ul></ul>
                    </div>
                    <div class="card-list" id="special">
                        <h3>Spezialkarten (Grün)</h3>
                        <ul></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/loader.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
